name: Deploy Pricing Service

on:
  push:
    branches:
      - main
    paths:
      - "cab_booking/Pricing-Service/**"
      - "cab_booking/common/**"
      - ".github/workflows/pricing-service-deploy.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: pricing-service
  SERVICE_NAME: pricing-service
  SERVICE_PORT: "8087"

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build common module
        working-directory: cab_booking/common
        run: mvn clean install -DskipTests -B

      - name: Test pricing service
        working-directory: cab_booking/Pricing-Service
        run: mvn test -B

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: cab_booking
          file: cab_booking/Pricing-Service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            DOCKER_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
            ETA_URL="${{ secrets.ETA_SERVICE_URL }}"

            docker network create pricing-net 2>/dev/null || true

            docker rm -f pricing-mongo pricing-redis ${{ env.SERVICE_NAME }} 2>/dev/null || true

            docker run -d \
              --name pricing-mongo \
              --network pricing-net \
              --restart unless-stopped \
              -e MONGO_INITDB_ROOT_USERNAME=admin \
              -e MONGO_INITDB_ROOT_PASSWORD="${{ secrets.MONGO_PASSWORD }}" \
              -v pricing-mongo-data:/data/db \
              mongo:7.0

            docker run -d \
              --name pricing-redis \
              --network pricing-net \
              --restart unless-stopped \
              -v pricing-redis-data:/data \
              redis:7-alpine redis-server --requirepass "${{ secrets.REDIS_PASSWORD }}"

            docker pull "$DOCKER_IMAGE"

            docker run -d \
              --name ${{ env.SERVICE_NAME }} \
              --network pricing-net \
              --restart unless-stopped \
              -p ${{ env.SERVICE_PORT }}:${{ env.SERVICE_PORT }} \
              -e SPRING_PROFILES_ACTIVE=staging \
              -e SPRING_CLOUD_CONFIG_ENABLED=false \
              -e EUREKA_CLIENT_ENABLED=false \
              -e MONGODB_URI="mongodb://admin:${{ secrets.MONGO_PASSWORD }}@pricing-mongo:27017/pricing_db?authSource=admin" \
              -e REDIS_HOST=pricing-redis \
              -e REDIS_PORT=6379 \
              -e REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
              -e MAPBOX_API_KEY="${{ secrets.MAPBOX_API_KEY }}" \
              -e ETA_SERVICE_URL="${ETA_URL:-http://localhost:8088}" \
              "$DOCKER_IMAGE"

            for i in $(seq 1 30); do
              if curl -fsS "http://localhost:${{ env.SERVICE_PORT }}/actuator/health"; then
                docker image prune -f
                exit 0
              fi
              sleep 3
            done

            docker logs ${{ env.SERVICE_NAME }} --tail 120
            exit 1
