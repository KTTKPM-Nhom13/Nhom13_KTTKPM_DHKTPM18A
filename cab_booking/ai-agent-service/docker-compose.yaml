services:
  ai-agent-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent-service
    ports:
      - "${AI_AGENT_SERVICE_PORT:-8099}:${AI_AGENT_SERVICE_PORT:-8099}"
    env_file:
      - ../.env
    environment:
      - PORT=${AI_AGENT_SERVICE_PORT:-8099}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_NAMES=${GEMINI_MODEL_NAMES:-gemini-2.5-flash,gemini-2.0-flash,gemini-2.5-flash-lite}
      - SPRING_GATEWAY_URL=http://api-gateway:8080
    networks:
      - cab-network
    depends_on:
      api-gateway:
        condition: service_started
    restart: on-failure

networks:
  cab-network:
    driver: bridge
