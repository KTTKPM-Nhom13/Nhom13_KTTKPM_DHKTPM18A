server:
  port: 8086

spring:
  application:
    name: matching-service

  kafka:
    bootstrap-servers: ${KAFKA_URL:localhost:9092}
    properties:
      security.protocol: PLAINTEXT
      # Override Spring Boot 4.x default that injects the removed JmxReporter class.
      # Kafka client 4.x no longer ships org.apache.kafka.common.metrics.JmxReporter.
      metric.reporters: ""
    admin:
      properties:
        security.protocol: PLAINTEXT
        metric.reporters: ""
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        security.protocol: PLAINTEXT
        metric.reporters: ""
        spring.json.add.type.headers: true
        spring.json.type.mapping: matching-retry-requested:com.cab.matching.core.dto.event.inbound.RideCreatedEvent,ride-assigned:com.cab.matching.core.dto.event.outbound.RideAssignedEvent,ride-cancelled:com.cab.matching.core.dto.event.outbound.RideCancelledEvent,matching-failed:com.cab.matching.core.dto.event.outbound.MatchingFailedEvent
    consumer:
      group-id: matching-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        security.protocol: PLAINTEXT
        metric.reporters: ""
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true
        spring.json.type.mapping: ride.created:com.cab.matching.core.dto.event.inbound.RideCreatedEvent,ride-created:com.cab.matching.core.dto.event.inbound.RideCreatedEvent,matching.retry.requested:com.cab.matching.core.dto.event.inbound.RideCreatedEvent,matching-retry-requested:com.cab.matching.core.dto.event.inbound.RideCreatedEvent,ride-rejected:com.cab.matching.core.dto.event.inbound.DriverRejectedEvent,ride.cancelled:com.cab.matching.core.dto.event.inbound.RideCancelledEvent,ride-cancelled:com.cab.matching.core.dto.event.inbound.RideCancelledEvent,com.cab.booking.core.dto.event.outbound.RideCancelledEvent:com.cab.matching.core.dto.event.inbound.RideCancelledEvent

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:${EUREKA_SERVER_URL:http://localhost:8761/eureka/}}
    register-with-eureka: true
    fetch-registry: true

resilience4j:
  circuitbreaker:
    instances:
      aiScoringService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      aiScoringService:
        max-attempts: 2
        wait-duration: 200ms
        retry-exceptions:
          - feign.RetryableException
          - java.io.IOException
  timelimiter:
    instances:
      aiScoringService:
        timeout-duration: 2s
  bulkhead:
    instances:
      aiScoringService:
        max-concurrent-calls: 10
        max-wait-duration: 50ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    circuitbreakers:
      enabled: true
