server:
  port: 8081

spring:
  application:
    name: booking-service
  
  # Cấu hình Database
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/cab_booking}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # Tắt log SQL để dễ nhìn log Kafka/Redis hơn
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Cấu hình Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Cấu hình chuẩn cho KAFKA
  kafka:
    bootstrap-servers: ${KAFKA_URL:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # BOOKING PHÁT RA CÁC SỰ KIỆN LIÊN QUAN ĐẾN ĐƠN ĐẶT
        # JsonSerializer sets __TypeId__ header using these aliases so downstream
        # consumers (matching, ride, driver) can resolve the DTO via their type mappings.
        spring.json.add.type.headers: true
        spring.json.type.mapping: >
          ride-created:com.cab.booking.core.dto.event.outbound.RideCreatedEvent,
          payment-requested:com.cab.booking.core.dto.event.outbound.PaymentRequestedEvent,
          ride-cancelled:com.cab.booking.core.dto.event.outbound.RideCancelledEvent,
          booking-timeout:com.cab.booking.core.dto.event.outbound.BookingTimeoutEvent
    consumer:
      group-id: booking-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        # BOOKING NHẬN VỀ CÁC SỰ KIỆN TỪ MATCHING, RIDE, VÀ PAYMENT
        # All Kafka domain events use typed DTO classes. No Map payloads.
        spring.json.type.mapping: >
          ride-assigned:com.cab.booking.core.dto.event.inbound.RideAssignedEvent,
          com.cab.matching.core.dto.event.outbound.RideAssignedEvent:com.cab.booking.core.dto.event.inbound.RideAssignedEvent,
          ride-accepted:com.cab.booking.core.dto.event.inbound.DriverAcceptedEvent,
          ride-rejected:com.cab.booking.core.dto.event.inbound.DriverRejectedEvent,
          ride-cancelled:com.cab.booking.core.dto.event.inbound.RideCancelledEvent,
          ride-arrived:com.cab.booking.core.dto.event.inbound.RideArrivedEvent,
          ride-started:com.cab.booking.core.dto.event.inbound.RideStartedEvent,
          ride-completed:com.cab.booking.core.dto.event.inbound.RideCompletedEvent,
          matching-failed:com.cab.booking.core.dto.event.inbound.MatchingFailedEvent,
          payment-completed:com.cab.booking.core.dto.event.inbound.PaymentCompletedEvent,
          payment-failed:com.cab.booking.core.dto.event.inbound.PaymentFailedEvent

# Cấu hình Eureka Client
eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

resilience4j:
  circuitbreaker:
    instances:
      pricingService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.cab.booking.common.BookingException
      userService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      driverService:
        max-attempts: 3
        wait-duration: 3s
      pricingService:
        max-attempts: 3
        wait-duration: 300ms
        retry-exceptions:
          - com.cab.booking.core.client.PricingClient$PricingInfrastructureException
          - org.springframework.web.client.ResourceAccessException
        ignore-exceptions:
          - com.cab.booking.common.BookingException
      userService:
        max-attempts: 2
        wait-duration: 200ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
  timelimiter:
    instances:
      pricingService:
        timeout-duration: 2s
      userService:
        timeout-duration: 1s
  bulkhead:
    instances:
      pricingService:
        max-concurrent-calls: 20
        max-wait-duration: 100ms
      userService:
        max-concurrent-calls: 30
        max-wait-duration: 100ms

# Cấu hình bảo mật — đọc bởi iuh.fit.common.config.SecurityConfig
# JWT được decode bằng RSA public key (từ certs/ hoặc biến môi trường JWT_PRIVATE_KEY)
app:
  booking:
    timeout:
      # Total booking timeout in minutes — how long a booking stays in MATCHING before auto-cancel.
      # Applies to both CASH and online-payment bookings.
      matching-minutes: ${BOOKING_TIMEOUT_MINUTES:5}
  services:
    pricing:
      base-url: ${PRICING_SERVICE_URL:http://localhost:8084}
    user:
      base-url: ${USER_SERVICE_URL:http://localhost:8082}
  security:
    # Các endpoint không cần xác thực JWT (phân cách bằng dấu phẩy)
    public-endpoints: >-
      /actuator/health,
      /actuator/info,
      /v3/api-docs/**,
      /swagger-ui/**,
      /swagger-ui.html,
      /api/v1/bookings,
      /api/v1/bookings/ping,
      /api/v1/bookings/demo/**

# ==========================================================
# CẤU HÌNH DISTRIBUTED TRACING (ZIPKIN & MICROMETER)
# ==========================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    circuitbreakers:
      enabled: true
  tracing:
    sampling:
      probability: 1.0 # 1.0 = Bắt 100% traces (Tốt cho dev, lúc lên Production nên giảm xuống 0.1)
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# ==========================================================
# CẤU HÌNH SWAGGER (OPENAPI 3)
# ==========================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE
    org.springframework.kafka: INFO
    org.apache.kafka.clients.consumer: INFO
