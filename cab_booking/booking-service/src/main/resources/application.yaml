server:
  port: 8081

spring:
  application:
    name: booking-service
  
  # Cấu hình Database
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/cab_booking}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # Tắt log SQL để dễ nhìn log Kafka/Redis hơn
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Cấu hình Redis
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  # Cấu hình chuẩn cho KAFKA
  kafka:
    bootstrap-servers: ${KAFKA_URL:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: booking-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"

# Cấu hình Eureka Client
eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

resilience4j:
  retry:
    instances:
      driverService:
        max-attempts: 3
        wait-duration: 3s

app:
  security:
    jwt:
      secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# ==========================================================
# CẤU HÌNH DISTRIBUTED TRACING (ZIPKIN & MICROMETER)
# ==========================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0 # 1.0 = Bắt 100% traces (Tốt cho dev, lúc lên Production nên giảm xuống 0.1)
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# ==========================================================
# CẤU HÌNH SWAGGER (OPENAPI 3)
# ==========================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha