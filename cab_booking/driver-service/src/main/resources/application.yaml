spring:
  application:
    name: driver-service
  config:
    import: "optional:configserver:http://localhost:8888"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.type.mapping: >
          driver-status:iuh.fit.driverservice.dto.event.DriverStatusEvent,
          ride-accepted:iuh.fit.driverservice.dto.event.DriverAcceptedEvent,
          ride-rejected:iuh.fit.driverservice.dto.event.DriverRejectedEvent
    consumer:
      group-id: driver-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        # All Kafka domain events use typed DTO classes. No Map payloads.
        spring.json.type.mapping: >
          ride-assigned:iuh.fit.driverservice.dto.event.RideAssignedEvent,
          ride-completed:iuh.fit.driverservice.dto.event.RideLifecycleEvent,
          ride-cancelled:iuh.fit.driverservice.dto.event.RideLifecycleEvent,
          ride-finished:iuh.fit.driverservice.dto.event.RideFinishedEvent,
          payment-completed:iuh.fit.driverservice.dto.event.PaymentCompletedEvent

driver:
  assignment:
    ttl-seconds: ${DRIVER_ASSIGNMENT_TTL_SECONDS:30}
